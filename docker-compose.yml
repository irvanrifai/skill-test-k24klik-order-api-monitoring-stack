services:
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: k24klik-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/rules.yml:/etc/prometheus/rules.yml
      - prometheus_data:/prometheus
    networks:
      - monitoring
    labels:
      - "k24klik_env=${K24KLIK_ENV}"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--tries=1",
          "--spider",
          "http://localhost:9090/-/healthy",
        ]
      interval: 10s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:10.4.0
    container_name: k24klik-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    networks:
      - monitoring
    labels:
      - "k24klik_env=${K24KLIK_ENV}"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--tries=1",
          "--spider",
          "http://localhost:3000/api/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 3

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: k24klik-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    networks:
      - monitoring
    labels:
      - "k24klik_env=${K24KLIK_ENV}"

  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: k24klik-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)(\
        $$|/)"
    networks:
      - monitoring
    labels:
      - "k24klik_env=${K24KLIK_ENV}"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: k24klik-cadvisor
    restart: unless-stopped
    privileged: true
    ports:
      - "8081:8080" # Port 8080 host bentrok dengan API Gateway, kita arahkan ke 8081 
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
      - /dev/kmsg:/dev/kmsg
    networks:
      - monitoring
    labels:
      - "k24klik_env=${K24KLIK_ENV}"

  redis-exporter:
    image: oliver006/redis_exporter
    container_name: k24klik-redis-exporter
    restart: unless-stopped
    networks:
      - monitoring
    labels:
      - "k24klik_env=${K24KLIK_ENV}"

networks:
  monitoring:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
