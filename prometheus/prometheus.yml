global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: 'production'
    app: 'k24klik'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - "rules.yml"

scrape_configs:
  - job_name: 'k24klik-monitoring'
    static_configs:
      - targets: 
          - 'prometheus:9090'
          - 'node-exporter:9100'
          - 'cadvisor:8080'
          - 'alertmanager:9093'
          - 'redis-exporter:9121'